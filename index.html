<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TypeScript Currency Converter</title>
  </head>

  <body>
    <main class="container">
      <h1>Currency Converter</h1>

      <form id="convert-form">
        <label>
          Amount
          <input
            id="amount"
            type="number"
            step="0.01"
            min="0"
            value="100"
            inputmode="decimal"
            autocomplete="off"
            required
          />
        </label>

        <div class="row">
          <label>
            From
            <select id="from"></select>
          </label>

          <button
            id="swap-btn"
            type="button"
            title="Swap"
            aria-label="Swap currencies"
          >
            &#x21C4;
          </button>

          <label>
            To
            <select id="to"></select>
          </label>
        </div>

        <button id="convert" type="submit">Convert</button>
      </form>

      <section id="status" aria-live="polite"></section>

      <div id="result-row">
        <output id="result" for="amount from to"></output>
        <button id="copy-btn" type="button" title="Copy result">Copy</button>
      </div>

      <div id="rate-preview" aria-live="polite" aria-atomic="true"></div>

      <p class="footnote">
        Rates by
        <a
          href="https://frankfurter.dev/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Frankfurter
        </a>
      </p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
